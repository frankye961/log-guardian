name: LogGuardian CD

on:
  workflow_run:
    workflows: ["LogGuardian CI"]
    types: [completed]

concurrency:
  group: cd-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Package Maven Artifacts And Create Release
    runs-on: self-hosted
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build Maven packages
        run: mvn -B -DskipTests package

      - name: Compute release metadata
        shell: bash
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          SHORT_SHA="${RELEASE_SHA::7}"
          TAG="v${VERSION}-${SHORT_SHA}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find target -maxdepth 1 -type f \( -name '*.jar' -o -name '*.pom' \) ! -name '*.jar.original' -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: LogGuardian ${{ env.VERSION }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          prerelease: ${{ contains(env.VERSION, 'SNAPSHOT') }}
          files: release-assets/*
