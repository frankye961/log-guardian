spring:
  application:
    name: logguardian
  autoconfigure:
    exclude: ${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration}
  main:
    web-application-type: ${SPRING_MAIN_WEB_APPLICATION_TYPE:none}
  ai:
    chat:
      client:
        enabled: ${SPRING_AI_CHAT_CLIENT_ENABLED:false}
    model:
      chat: ${MODEL_AI:}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5-mini}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/logguardian}
      database: ${MONGODB_DATABASE:logguardian}
      auto-index-creation: ${MONGODB_AUTO_INDEX_CREATION:true}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5s}
      repositories:
        enabled: ${REDIS_REPOSITORIES_ENABLED:false}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:500000}
          timeout: ${MAIL_SMTP_TIMEOUT:500000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:500000}

logguardian:
  mode: ${LOGGUARDIAN_MODE:cli}
  ingest:
    multiline:
      idle-flush-ms: ${LOGGUARDIAN_MULTILINE_IDLE_FLUSH_MS:800}
      max-lines: ${LOGGUARDIAN_MULTILINE_MAX_LINES:500}
  detection:
    window-seconds: ${LOGGUARDIAN_WINDOW_SECONDS:60}
    min-count-threshold: ${LOGGUARDIAN_MIN_COUNT_THRESHOLD:20}
  ai:
    enabled: ${LOGGUARDIAN_AI_ENABLED:true}
    prompt-template: |
      You are analyzing an application incident detected from logs.

      Fingerprint: {fingerprint}
      Level: {level}
      Occurrences in current window: {count}
      Source ID: {sourceId}
      Source Name: {sourceName}

      Sample logs:
      {samples}

      Provide:
      1. A short title
      2. A short summary of what likely happened
      3. The probable root cause
      4. Suggested investigation steps
      5. Severity (LOW, MEDIUM, HIGH)

      Format the response as plain text.
  notifications:
    email:
      enabled: ${LOGGUARDIAN_EMAIL_ENABLED:true}
      from: ${LOGGUARDIAN_EMAIL_FROM:warning@log-guardian.com}
      to: ${LOGGUARDIAN_EMAIL_TO:test@example.com}
      subject-prefix: ${LOGGUARDIAN_EMAIL_SUBJECT_PREFIX:[LogGuardian - ANOMALY DETECTED]}
      reply-to: ${LOGGUARDIAN_EMAIL_REPLY_TO:test@example.com}

docker:
  host: ${DOCKER_HOST:}

kubernetes:
  namespace: ${KUBERNETES_NAMESPACE:default}
  all-namespaces: ${KUBERNETES_ALL_NAMESPACES:false}

logging:
  level:
    root: ERROR
